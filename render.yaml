services:
  # 1. FastAPI Backend (Web Service)
  - type: web
    name: build-your-story-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: story-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # Set this in Render dashboard
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"

  # 2. Vite React Frontend (Static Site)
  - type: web
    name: build-your-story
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://build-your-story-backend.onrender.com"

databases:
  # 3. PostgreSQL Database
  - name: story-db
    plan: free
